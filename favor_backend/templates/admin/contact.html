{% load static %}
<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Favor Indonesia</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-gray-900 text-white flex flex-col">
            <div class="p-4 border-b border-gray-800">
                <h1 class="text-xl font-bold">Favor Indonesia</h1>
            </div>
            <nav class="flex-1 p-4">
                <a href="/dashboard/" class="flex items-center gap-3 p-3 rounded hover:bg-gray-800 text-white mb-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                    </svg>
                    <span>Dashboard</span>
                </a>
                <a href="/products/" class="flex items-center gap-3 p-3 rounded hover:bg-gray-800 text-white mb-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
                    </svg>
                    <span>Products</span>
                </a>
                <a href="/brands/" class="flex items-center gap-3 p-3 rounded hover:bg-gray-800 text-white mb-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z" />
                    </svg>
                    <span>Brands</span>
                </a>
                <a href="/partnerships/" class="flex items-center gap-3 p-3 rounded hover:bg-gray-800 text-white mb-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
                    </svg>
                    <span>Partnerships</span>
                </a>
                <a href="/news/" class="flex items-center gap-3 p-3 rounded hover:bg-gray-800 text-white mb-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z" />
                    </svg>
                    <span>News</span>
                </a>
                <a href="/contact/" class="flex items-center gap-3 p-3 rounded bg-blue-600 text-white mb-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                    </svg>
                    <span>Contact</span>
                </a>
            </nav>
        </aside>

        <!-- Main -->
        <div class="flex-1 flex flex-col">
            <header class="bg-white shadow p-4 flex justify-between items-center">
                <h2 class="text-xl font-semibold">Contact Management</h2>
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center text-white">A</div>
                    <span class="text-sm">Admin</span>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto p-6">
                <!-- Tabs -->
                <div class="mb-6 border-b">
                    <button onclick="switchTab('messages')" id="tab-messages"
                        class="px-6 py-3 border-b-2 border-blue-600 font-semibold text-blue-600">
                        Messages
                    </button>
                    <button onclick="switchTab('company')" id="tab-company"
                        class="px-6 py-3 border-b-2 border-transparent font-semibold text-gray-600 hover:text-blue-600">
                        Company Info
                    </button>
                </div>

                <!-- Messages Section -->
                <div id="section-messages">
                    <div class="mb-6">
                        <h3 class="text-2xl font-bold">Contact Messages</h3>
                        <p class="text-gray-600">View and manage customer messages</p>
                    </div>

                    <div class="bg-white rounded-lg shadow mb-6 p-4">
                        <div class="flex gap-4">
                            <input type="text" id="searchMessages" placeholder="Search messages..."
                                onkeyup="filterMessages()" class="flex-1 px-4 py-2 border rounded-lg">
                            <select id="readFilter" onchange="filterMessages()" class="px-4 py-2 border rounded-lg">
                                <option value="all">All Messages</option>
                                <option value="unread">Unread</option>
                                <option value="read">Read</option>
                            </select>
                        </div>
                    </div>

                    <div class="bg-white rounded-lg shadow">
                        <div class="p-6 border-b">
                            <h3 class="text-lg font-semibold">Message List</h3>
                        </div>
                        <div id="messages-container" class="p-6">
                            <div class="flex justify-center py-12">
                                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Company Info Section -->
                <div id="section-company" class="hidden">
                    <div class="mb-6">
                        <h3 class="text-2xl font-bold">Company Information</h3>
                        <p class="text-gray-600">Update company details and contact information</p>
                    </div>

                    <div id="company-container" class="bg-white rounded-lg shadow p-6">
                        <div class="flex justify-center py-12">
                            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        let allMessages = [];
        let companyInfo = null;

        // ✅ Tambahkan fungsi getCookie untuk CSRF token
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        function switchTab(tab) {
            if (tab === 'messages') {
                document.getElementById('section-messages').classList.remove('hidden');
                document.getElementById('section-company').classList.add('hidden');
                document.getElementById('tab-messages').className = 'px-6 py-3 border-b-2 border-blue-600 font-semibold text-blue-600';
                document.getElementById('tab-company').className = 'px-6 py-3 border-b-2 border-transparent font-semibold text-gray-600';
            } else {
                document.getElementById('section-messages').classList.add('hidden');
                document.getElementById('section-company').classList.remove('hidden');
                document.getElementById('tab-messages').className = 'px-6 py-3 border-b-2 border-transparent font-semibold text-gray-600';
                document.getElementById('tab-company').className = 'px-6 py-3 border-b-2 border-blue-600 font-semibold text-blue-600';
                if (!companyInfo) loadCompanyInfo();
            }
        }

        async function loadMessages() {
            try {
                const res = await fetch('/api/contact/');
                if (!res.ok) throw new Error('Failed to fetch messages');
                const result = await res.json();
                allMessages = result.status === 'success' ? result.data : result;
                displayMessages(allMessages);
            } catch (e) {
                document.getElementById('messages-container').innerHTML = `
                <div class="text-center py-12">
                    <p class="text-red-600 font-medium">Error loading messages</p>
                    <button onclick="loadMessages()" class="mt-4 bg-blue-600 text-white px-4 py-2 rounded-lg">Retry</button>
                </div>
            `;
            }
        }

        function displayMessages(items) {
            const container = document.getElementById('messages-container');
            if (!items || items.length === 0) {
                container.innerHTML = `
                <div class="text-center py-12">
                    <svg class="w-16 h-16 text-gray-400 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                    </svg>
                    <p class="text-gray-600 font-medium">No messages found</p>
                </div>
            `;
                return;
            }

            container.innerHTML = `
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-50 border-b">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Name</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Email</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Phone</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Subject</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-200">
                        ${items.map(item => `
                            <tr class="hover:bg-gray-50 transition-colors ${!item.is_read ? 'bg-blue-50' : ''}">
                                <td class="px-6 py-4 font-medium text-gray-900">${item.name}</td>
                                <td class="px-6 py-4 text-sm text-gray-600">${item.email}</td>
                                <td class="px-6 py-4 text-sm text-gray-600">${item.phone || 'N/A'}</td>
                                <td class="px-6 py-4 text-sm text-gray-600">${item.subject || 'No subject'}</td>
                                <td class="px-6 py-4">
                                    <span class="px-2 py-1 text-xs rounded ${item.is_read ? 'bg-gray-100 text-gray-800' : 'bg-blue-100 text-blue-800 font-semibold'}">
                                        ${item.is_read ? 'Read' : 'New'}
                                    </span>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                                    <button onclick="viewMessage(${item.id})" class="text-blue-600 hover:text-blue-900 mr-4">
                                        <svg class="w-5 h-5 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                        </svg>
                                    </button>
                                    <button onclick="deleteMessage(${item.id}, '${item.name}')" class="text-red-600 hover:text-red-900">
                                        <svg class="w-5 h-5 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                                        </svg>
                                    </button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
            <div class="px-6 py-4 border-t text-sm text-gray-600">
                Showing ${items.length} message${items.length !== 1 ? 's' : ''}
            </div>
        `;
        }

        function filterMessages() {
            const term = document.getElementById('searchMessages').value.toLowerCase();
            const status = document.getElementById('readFilter').value;

            const filtered = allMessages.filter(i => {
                const matchSearch = i.name.toLowerCase().includes(term) ||
                    i.email.toLowerCase().includes(term) ||
                    (i.subject && i.subject.toLowerCase().includes(term));
                const matchStatus = status === 'all' ||
                    (status === 'read' && i.is_read) ||
                    (status === 'unread' && !i.is_read);
                return matchSearch && matchStatus;
            });

            displayMessages(filtered);
        }

        async function viewMessage(id) {
            try {
                const res = await fetch(`/api/contact/${id}/`);
                if (!res.ok) throw new Error('Failed to fetch message');

                const result = await res.json();
                const item = result.status === 'success' ? result.data : result;

                // ✅ Mark as read dengan CSRF token
                if (!item.is_read) {
                    await fetch(`/api/contact/${id}/`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': getCookie('csrftoken')
                        },
                        body: JSON.stringify({ ...item, is_read: true })
                    });
                }

                const modal = document.createElement('div');
                modal.id = 'modal';
                modal.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4';
                modal.innerHTML = `
                <div class="bg-white rounded-lg max-w-2xl w-full max-h-[90vh] overflow-y-auto">
                    <div class="p-6 border-b flex justify-between items-center sticky top-0 bg-white z-10">
                        <h3 class="text-xl font-semibold">Message Details</h3>
                        <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                            </svg>
                        </button>
                    </div>
                    <div class="p-6 space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
                            <p class="text-gray-900">${item.name}</p>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                                <p class="text-gray-900">${item.email}</p>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Phone</label>
                                <p class="text-gray-900">${item.phone || 'N/A'}</p>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Subject</label>
                            <p class="text-gray-900">${item.subject || 'No subject'}</p>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Message</label>
                            <p class="text-gray-900 whitespace-pre-wrap border rounded-lg p-4 bg-gray-50">${item.message}</p>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Received</label>
                            <p class="text-gray-900">${new Date(item.created_at).toLocaleString('id-ID')}</p>
                        </div>
                        <div class="flex justify-end gap-3 pt-4 border-t">
                            <a href="mailto:${item.email}" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Reply via Email</a>
                            <button onclick="closeModal()" class="px-6 py-2 border rounded-lg hover:bg-gray-50">Close</button>
                        </div>
                    </div>
                </div>
            `;
                document.body.appendChild(modal);

                // Reload to update read status
                loadMessages();
            } catch (error) {
                alert('❌ Error loading message: ' + error.message);
            }
        }

        async function deleteMessage(id, name) {
            if (!confirm(`Are you sure you want to delete message from "${name}"?`)) return;

            try {
                const res = await fetch(`/api/contact/${id}/`, {
                    method: 'DELETE',
                    headers: {
                        'X-CSRFToken': getCookie('csrftoken')
                    }
                });

                if (res.ok || res.status === 204) {
                    loadMessages();
                    alert('✅ Message deleted successfully!');
                } else {
                    const error = await res.json();
                    alert('❌ Error: ' + (error.message || 'Failed to delete message'));
                }
            } catch (error) {
                alert('❌ Error: ' + error.message);
            }
        }

        // Company Info
        async function loadCompanyInfo() {
            try {
                const res = await fetch('/api/contact/company-info/');
                if (!res.ok) throw new Error('Failed to fetch company info');

                const result = await res.json();
                companyInfo = result.status === 'success' ? result.data : result;
                displayCompanyInfo();
            } catch (e) {
                document.getElementById('company-container').innerHTML = `
                <div class="text-center py-12">
                    <p class="text-red-600 font-medium">Error loading company info</p>
                    <button onclick="loadCompanyInfo()" class="mt-4 bg-blue-600 text-white px-4 py-2 rounded-lg">Retry</button>
                </div>
            `;
            }
        }

        function displayCompanyInfo() {
            if (!companyInfo) {
                document.getElementById('company-container').innerHTML = `
                <div class="text-center py-12">
                    <svg class="w-16 h-16 text-gray-400 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                    </svg>
                    <p class="text-gray-600 font-medium">No company info found</p>
                    <p class="text-gray-500 text-sm mt-2">Please add company information via Django admin</p>
                </div>
            `;
                return;
            }

            document.getElementById('company-container').innerHTML = `
            <form id="companyForm" class="space-y-6">
                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">Company Name *</label>
                        <input type="text" name="company_name" value="${companyInfo.company_name}" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Email *</label>
                        <input type="email" name="email" value="${companyInfo.email}" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">Phone *</label>
                        <input type="text" name="phone" value="${companyInfo.phone}" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">WhatsApp</label>
                        <input type="text" name="whatsapp" value="${companyInfo.whatsapp || ''}" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-2">Address *</label>
                    <textarea name="address" rows="3" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">${companyInfo.address}</textarea>
                </div>
                
                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">City *</label>
                        <input type="text" name="city" value="${companyInfo.city}" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Postal Code *</label>
                        <input type="text" name="postal_code" value="${companyInfo.postal_code}" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-2">Business Hours</label>
                    <textarea name="business_hours" rows="2" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">${companyInfo.business_hours || ''}</textarea>
                    <p class="text-xs text-gray-500 mt-1">Example: Monday - Friday: 9:00 AM - 5:00 PM</p>
                </div>
                
                <div class="border-t pt-6">
                    <h4 class="font-semibold mb-4 text-gray-700">Social Media</h4>
                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium mb-2">Facebook</label>
                            <input type="url" name="facebook" value="${companyInfo.facebook || ''}" placeholder="https://facebook.com/..." class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2">Instagram</label>
                            <input type="url" name="instagram" value="${companyInfo.instagram || ''}" placeholder="https://instagram.com/..." class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2">Twitter</label>
                            <input type="url" name="twitter" value="${companyInfo.twitter || ''}" placeholder="https://twitter.com/..." class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2">LinkedIn</label>
                            <input type="url" name="linkedin" value="${companyInfo.linkedin || ''}" placeholder="https://linkedin.com/..." class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                        </div>
                    </div>
                </div>
                
                <div class="border-t pt-6">
                    <h4 class="font-semibold mb-4 text-gray-700">About Company</h4>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium mb-2">About Us</label>
                            <textarea name="about_us" rows="4" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="Tell us about your company...">${companyInfo.about_us || ''}</textarea>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2">Vision</label>
                            <textarea name="vision" rows="3" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="Company vision...">${companyInfo.vision || ''}</textarea>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2">Mission</label>
                            <textarea name="mission" rows="3" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="Company mission...">${companyInfo.mission || ''}</textarea>
                        </div>
                    </div>
                </div>
                
                <div class="flex justify-end gap-3 border-t pt-6">
                    <button type="button" onclick="loadCompanyInfo()" class="px-6 py-2 border rounded-lg hover:bg-gray-50">Reset</button>
                    <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                        <span id="saveText">Save Changes</span>
                        <span id="saveLoading" class="hidden">Saving...</span>
                    </button>
                </div>
            </form>
        `;

            document.getElementById('companyForm').onsubmit = async (e) => {
                e.preventDefault();
                const btn = e.target.querySelector('button[type="submit"]');
                const text = document.getElementById('saveText');
                const loading = document.getElementById('saveLoading');

                btn.disabled = true;
                text.classList.add('hidden');
                loading.classList.remove('hidden');

                const formData = new FormData(e.target);
                const data = Object.fromEntries(formData);

                try {
                    const res = await fetch('/api/contact/company-info/', {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': getCookie('csrftoken')
                        },
                        body: JSON.stringify(data)
                    });

                    if (res.ok) {
                        alert('✅ Company info updated successfully!');
                        companyInfo = null; // Reset cache
                        loadCompanyInfo();
                    } else {
                        const error = await res.json();
                        alert('❌ Error: ' + (error.message || 'Failed to update company info'));
                    }
                } catch (error) {
                    alert('❌ Error: ' + error.message);
                } finally {
                    btn.disabled = false;
                    text.classList.remove('hidden');
                    loading.classList.add('hidden');
                }
            };
        }

        function closeModal() {
            document.getElementById('modal')?.remove();
        }

        window.addEventListener('DOMContentLoaded', loadMessages);
    </script>
</body>
</html>
