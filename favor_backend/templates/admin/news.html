{% load static %}
<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News & Events - Favor Indonesia</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside id="sidebar" class="w-64 bg-gray-900 text-white transition-all duration-300 flex flex-col">
            <div class="p-4 flex items-center justify-between border-b border-gray-800">
                <h1 id="sidebar-title" class="text-xl font-bold">Favor Indonesia</h1>
                <button onclick="toggleSidebar()" class="p-2 hover:bg-gray-800 rounded">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
            </div>

            <nav class="flex-1 p-4">
                <a href="/dashboard/" class="menu-item" data-page="dashboard">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                    </svg>
                    <span class="menu-text">Dashboard</span>
                </a>

                <a href="/products/" class="menu-item" data-page="products">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
                    </svg>
                    <span class="menu-text">Products</span>
                </a>

                <a href="/brands/" class="menu-item" data-page="brands">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z" />
                    </svg>
                    <span class="menu-text">Brands</span>
                </a>

                <a href="/partnerships/" class="menu-item" data-page="partnerships">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
                    </svg>
                    <span class="menu-text">Partnerships</span>
                </a>

                <a href="/news/" class="menu-item active" data-page="news">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z" />
                    </svg>
                    <span class="menu-text">News</span>
                </a>

                <a href="/contact/" class="menu-item" data-page="contact">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                    </svg>
                    <span class="menu-text">Contact</span>
                </a>
            </nav>

            <div class="p-4 border-t border-gray-800">
                <a href="/admin/" class="menu-item">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    <span class="menu-text">Django Admin</span>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- Header -->
            <header class="bg-white shadow-sm border-b border-gray-200">
                <div class="flex items-center justify-between p-4">
                    <div class="flex items-center gap-4 flex-1">
                        <h2 class="text-xl font-semibold text-gray-800">News & Events Management</h2>
                    </div>

                    <div class="flex items-center gap-4">
                        <button class="relative p-2 hover:bg-gray-100 rounded-lg">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                            </svg>
                            <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
                        </button>

                        <div class="flex items-center gap-2 cursor-pointer hover:bg-gray-100 p-2 rounded-lg">
                            <div
                                class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center text-white font-semibold">
                                A
                            </div>
                            <div class="hidden md:block">
                                <p class="text-sm font-medium">Admin</p>
                                <p class="text-xs text-gray-500">admin@favor.id</p>
                            </div>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Content Area -->
            <main class="flex-1 overflow-y-auto p-6">
                <div class="mb-6">
                    <div class="flex justify-between items-center">
                        <div>
                            <h3 class="text-2xl font-bold text-gray-800">News & Events</h3>
                            <p class="text-gray-600">Manage all your news and events here</p>
                        </div>
                        <button onclick="showAddNewsForm()"
                            class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 flex items-center gap-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 4v16m8-8H4" />
                            </svg>
                            Add News
                        </button>
                    </div>
                </div>

                <!-- Search and Filter -->
                <div class="bg-white rounded-lg shadow mb-6 p-4">
                    <div class="flex gap-4 items-center">
                        <div class="flex-1">
                            <input type="text" id="searchInput" placeholder="Search news..."
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                onkeyup="filterNews()">
                        </div>
                        <select id="categoryFilter" onchange="filterNews()"
                            class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                            <option value="all">All Categories</option>
                        </select>
                        <select id="statusFilter" onchange="filterNews()"
                            class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                            <option value="all">All Status</option>
                            <option value="active">Active</option>
                            <option value="inactive">Inactive</option>
                        </select>
                    </div>
                </div>

                <!-- News Table -->
                <div class="bg-white rounded-lg shadow">
                    <div class="p-6 border-b border-gray-200">
                        <h3 class="text-lg font-semibold text-gray-800">News List</h3>
                    </div>

                    <div id="news-container" class="p-6">
                        <div class="flex justify-center items-center py-12">
                            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <style>
        .menu-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
            transition: background-color 0.2s;
            text-decoration: none;
            color: white;
        }

        .menu-item:hover {
            background-color: rgba(55, 65, 81, 1);
        }

        .menu-item.active {
            background-color: rgba(37, 99, 235, 1);
        }

        #sidebar.collapsed .menu-text,
        #sidebar.collapsed #sidebar-title {
            display: none;
        }

        #sidebar.collapsed {
            width: 5rem;
        }
    </style>

    <script>


        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let cookie of cookies) {
                    cookie = cookie.trim();
                    if (cookie.startsWith(name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        let allNews = [];

        /* ===============================
           LOAD CATEGORY
        ================================ */
        async function loadCategories() {
            try {
                const res = await fetch('/api/news/categories/');

                if (!res.ok) {
                    console.error('Category response not OK:', res.status);
                    return;
                }

                const result = await res.json();
                const data = result.data || result;

                const select = document.querySelector('select[name="category"]');
                if (!select) return;

                select.innerHTML = '<option value="">-- Select Category --</option>';

                if (Array.isArray(data)) {
                    data.forEach(cat => {
                        const opt = document.createElement('option');
                        opt.value = cat.id;
                        opt.textContent = cat.name;
                        select.appendChild(opt);
                    });
                }
            } catch (err) {
                console.error('Load category error:', err);
            }
        }

        /* ===============================
           LOAD NEWS
        ================================ */
        async function loadNews() {
            try {
                const res = await fetch('/api/news/');
                const result = await res.json();

                // Cek apakah response punya property 'data'
                allNews = result.data || result;  // ← UBAH INI
                renderNews(allNews);
            } catch (err) {
                console.error('Load news error', err);
                document.getElementById('news-container').innerHTML = '<p class="text-center text-red-500">Gagal memuat data</p>';
            }
        }

        /* ===============================
           RENDER TABLE
        ================================ */
        function renderNews(data) {
            const container = document.getElementById('news-container');
            if (!container) return;

            // Jika tidak ada data
            if (!data || data.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-500 py-8">Belum ada news</p>';
                return;
            }

            // Render sebagai card grid
            container.innerHTML = `
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            ${data.map(item => `
                <div class="border rounded-lg overflow-hidden shadow hover:shadow-lg transition">
                    ${item.image_url ? `
                        <img src="${item.image_url}" alt="${item.title}" 
                            class="w-full h-48 object-cover">
                    ` : `
                        <div class="w-full h-48 bg-gray-200 flex items-center justify-center">
                            <span class="text-gray-400">No Image</span>
                        </div>
                    `}
                    
                    <div class="p-4">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="text-xs px-2 py-1 rounded ${item.is_active ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-800'}">
                                ${item.is_active ? 'Active' : 'Draft'}
                            </span>
                            ${item.is_featured ? '<span class="text-xs px-2 py-1 rounded bg-blue-100 text-blue-800">Featured</span>' : ''}
                            <span class="text-xs text-gray-500">${item.category_name || 'Uncategorized'}</span>
                        </div>
                        
                        <h3 class="font-semibold text-lg mb-2 line-clamp-2">${item.title}</h3>
                        <p class="text-sm text-gray-600 mb-3 line-clamp-2">${item.short_description || ''}</p>
                        
                        <div class="flex justify-between items-center">
                            <span class="text-xs text-gray-400">${item.formatted_date || ''}</span>
                            <div class="flex gap-2">
                                <button onclick="editNews(${item.id})" 
                                    class="text-blue-600 hover:text-blue-800 text-sm">
                                    Edit
                                </button>
                                <button onclick="deleteNews(${item.id}, '${item.title.replace(/'/g, "\\'")}')" 
                                    class="text-red-600 hover:text-red-800 text-sm">
                                    Delete
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('')}
        </div>
    `;
        }

        /* ===============================
           OPEN MODAL
        ================================ */
        function showAddNewsForm() {
            const modal = document.createElement('div');
            modal.id = 'addNewsModal';
            modal.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50';

            modal.innerHTML = `
        <div class="bg-white rounded-xl w-full max-w-2xl p-6 max-h-[90vh] overflow-y-auto">
            <h2 class="text-xl font-semibold mb-4">Add News</h2>

            <form id="addNewsForm" enctype="multipart/form-data">
                <div class="grid grid-cols-2 gap-4">
                    <input name="title" placeholder="Title" required class="border p-2 rounded">
                    <select name="category" class="border p-2 rounded"></select>

                    <select name="is_active" class="border p-2 rounded">
                        <option value="true">Active</option>
                        <option value="false">Draft</option>
                    </select>

                    <select name="is_featured" class="border p-2 rounded">
                        <option value="false">No</option>
                        <option value="true">Yes</option>
                    </select>
                </div>

                <!-- TAMBAHKAN FIELD INI -->
                <input name="short_description" placeholder="Short Description (ringkasan singkat)" required 
                    class="border p-2 rounded w-full mt-4">

                <textarea name="content" rows="4" placeholder="Content (isi lengkap)"
                    class="border p-2 rounded w-full mt-4"></textarea>

                <input type="file" name="image" class="mt-4">

                <div class="flex justify-end gap-3 mt-6">
                    <button type="button" onclick="closeModal()" class="border px-4 py-2 rounded">
                        Cancel
                    </button>
                    <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded">
                        Save
                    </button>
                </div>
            </form>
        </div>
    `;

            document.body.appendChild(modal);
            loadCategories();

            document.getElementById('addNewsForm')
                .addEventListener('submit', submitNews);
        }

        /* ===============================
           CLOSE MODAL
        ================================ */
        function closeModal() {
            const modal = document.getElementById('addNewsModal');
            if (modal) modal.remove();
        }

        /* ===============================
           SUBMIT NEWS (POST)
        ================================ */
        async function submitNews(e) {
            e.preventDefault();

            const formData = new FormData(e.target);

            const data = {
                title: formData.get('title'),
                short_description: formData.get('short_description'),
                content: formData.get('content') || '',  // ← tambahkan default
                category: formData.get('category') || null,  // ← bisa null
                is_active: formData.get('is_active') === 'true',
                is_featured: formData.get('is_featured') === 'true',
            };

            const formDataToSend = new FormData();
            Object.keys(data).forEach(key => {
                if (data[key] !== null && data[key] !== '') {  // ← skip null/empty
                    formDataToSend.append(key, data[key]);
                }
            });

            const imageFile = formData.get('image');
            if (imageFile && imageFile.size > 0) {
                formDataToSend.append('image', imageFile);
            }

            try {
                const res = await fetch('/api/news/', {
                    method: 'POST',
                    headers: {
                        'X-CSRFToken': getCookie('csrftoken')
                    },
                    body: formDataToSend
                });

                const responseData = await res.json();  // ← parse dulu

                if (!res.ok) {
                    console.error('Error response:', responseData);
                    alert(`Gagal simpan: ${JSON.stringify(responseData)}`);
                    return;
                }

                alert('News berhasil disimpan!');
                closeModal();
                loadNews();
            } catch (err) {
                console.error('Submit error:', err);
                alert('Gagal simpan news. Cek console untuk detail.');
            }
        }

        /* ===============================
   EDIT NEWS
================================ */
        function editNews(id) {
            const item = allNews.find(n => n.id === id);
            if (!item) return;

            const modal = document.createElement('div');
            modal.id = 'addNewsModal';
            modal.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50';

            modal.innerHTML = `
        <div class="bg-white rounded-xl w-full max-w-2xl p-6 max-h-[90vh] overflow-y-auto">
            <h2 class="text-xl font-semibold mb-4">Edit News</h2>

            <form id="editNewsForm" enctype="multipart/form-data">
                <div class="grid grid-cols-2 gap-4">
                    <input name="title" placeholder="Title" required class="border p-2 rounded" value="${item.title}">
                    <select name="category" class="border p-2 rounded"></select>

                    <select name="is_active" class="border p-2 rounded">
                        <option value="true" ${item.is_active ? 'selected' : ''}>Active</option>
                        <option value="false" ${!item.is_active ? 'selected' : ''}>Draft</option>
                    </select>

                    <select name="is_featured" class="border p-2 rounded">
                        <option value="false" ${!item.is_featured ? 'selected' : ''}>No</option>
                        <option value="true" ${item.is_featured ? 'selected' : ''}>Yes</option>
                    </select>
                </div>

                <input name="short_description" placeholder="Short Description" required 
                    class="border p-2 rounded w-full mt-4" value="${item.short_description || ''}">

                <textarea name="content" rows="4" placeholder="Content"
                    class="border p-2 rounded w-full mt-4">${item.content || ''}</textarea>

                ${item.image_url ? `
                    <div class="mt-4">
                        <p class="text-sm text-gray-600 mb-2">Current Image:</p>
                        <img src="${item.image_url}" class="h-32 object-cover rounded">
                    </div>
                ` : ''}

                <input type="file" name="image" class="mt-4">
                <p class="text-xs text-gray-500 mt-1">Leave empty to keep current image</p>

                <div class="flex justify-end gap-3 mt-6">
                    <button type="button" onclick="closeModal()" class="border px-4 py-2 rounded">
                        Cancel
                    </button>
                    <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded">
                        Update
                    </button>
                </div>
            </form>
        </div>
    `;

            document.body.appendChild(modal);

            // Load categories setelah modal dibuat
            loadCategories().then(() => {
                const categorySelect = document.querySelector('select[name="category"]');
                if (categorySelect && item.category) {
                    categorySelect.value = item.category;
                }
            });

            // Handle form submit
            document.getElementById('editNewsForm').addEventListener('submit', async function (e) {
                e.preventDefault();

                const formData = new FormData(e.target);
                const formDataToSend = new FormData();

                // Append all fields
                formDataToSend.append('title', formData.get('title'));
                formDataToSend.append('short_description', formData.get('short_description'));
                formDataToSend.append('content', formData.get('content') || '');
                formDataToSend.append('category', formData.get('category'));
                formDataToSend.append('is_active', formData.get('is_active') === 'true');
                formDataToSend.append('is_featured', formData.get('is_featured') === 'true');

                // Handle image upload
                const imageFile = formData.get('image');
                if (imageFile && imageFile.size > 0) {
                    formDataToSend.append('image', imageFile);
                }

                try {
                    const res = await fetch(`/api/news/${id}/`, {
                        method: 'PUT',
                        headers: {
                            'X-CSRFToken': getCookie('csrftoken')
                        },
                        body: formDataToSend
                    });

                    if (!res.ok) {
                        const error = await res.json();
                        console.error('Error response:', error);
                        alert(`Gagal update: ${JSON.stringify(error)}`);
                        return;
                    }

                    alert('News berhasil diupdate!');
                    closeModal();
                    loadNews();
                } catch (err) {
                    console.error('Update error:', err);
                    alert('Gagal update news. Cek console untuk detail.');
                }
            });
        }

        /* ===============================
           DELETE NEWS
        ================================ */
        async function deleteNews(id, title) {
            if (!confirm(`Hapus "${title}"?`)) return;

            await fetch(`/api/news/${id}/`, {
                method: 'DELETE',
                headers: { 'X-CSRFToken': getCookie('csrftoken') }
            });

            loadNews();
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadNews();
        });
    </script>
</body>

</html>
